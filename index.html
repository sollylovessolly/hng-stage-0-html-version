<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Todo Card - Stage 1</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div class="min-h-screen flex items-center justify-center p-6">
    <article data-testid="test-todo-card" class="todo-card">
      <div class="card-body">

        <div id="display-mode">
          <h2 data-testid="test-todo-title" id="todo-title" class="todo-title">
            pick outfit for outing
          </h2>

          <div data-testid="test-todo-collapsible-section" id="collapsible-section" class="collapsible-section">
            <p data-testid="test-todo-description" id="todo-description" class="todo-description"></p>
          </div>

          <button data-testid="test-todo-expand-toggle" id="expand-toggle" class="expand-btn hidden" aria-expanded="false">
            Expand +
          </button>

          <div class="toggle-row">
            <div class="toggle-label">Mark as completed</div>
            <label class="toggle-switch" aria-label="Mark as completed">
              <input type="checkbox" data-testid="test-todo-complete-toggle" id="complete-toggle"/>
              <div class="toggle-track"></div>
              <div class="toggle-thumb"></div>
            </label>
          </div>

          <div class="badges">
            <span data-testid="test-todo-priority-indicator" id="priority-indicator" class="priority-indicator high" aria-label="High priority">●</span>
            <span data-testid="test-todo-priority" id="priority-badge" class="badge badge-priority">High</span>
            <span data-testid="test-todo-status" id="status-badge" class="badge badge-pending">Pending</span>
          </div>

          <p class="category-label">category</p>
          <div data-testid="test-todo-tags" class="tags">
            <span data-testid="test-todo-tag-social" class="tag">social</span>
            <span data-testid="test-todo-tag-fashion" class="tag">fashion</span>
          </div>

          <hr />

          <div class="card-footer">
            <div>
              <time data-testid="test-todo-due-date" id="due-date" class="due-date"></time>
              <div data-testid="test-todo-time-remaining" id="time-remaining" class="time-remaining"></div>
              <div data-testid="test-todo-overdue-indicator" id="overdue-indicator" class="overdue hidden" role="alert">Overdue</div>
            </div>

            <div class="action-buttons">
              <button data-testid="test-todo-edit-button" id="edit-btn" class="btn btn-edit" aria-haspopup="dialog">Edit</button>
              <button data-testid="test-todo-delete-button" id="delete-btn" class="btn btn-delete">Delete</button>
            </div>
          </div>

          <div class="status-control-container">
            <label for="status-control">Status:</label>
            <select data-testid="test-todo-status-control" id="status-control" aria-label="Change status">
              <option value="Pending">Pending</option>
              <option value="In Progress">In Progress</option>
              <option value="Done">Done</option>
            </select>
          </div>
        </div>

      </div>
    </article>
  </div>

  <!-- Edit Modal Overlay -->
  <div id="edit-overlay" class="edit-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="edit-modal-title">
    <div id="edit-modal" class="edit-modal">
      <h3 id="edit-modal-title" class="edit-modal-title">Edit Todo</h3>

      <div data-testid="test-todo-edit-form" class="edit-form">
        <div class="edit-field">
          <label for="edit-title">Title</label>
          <input type="text" data-testid="test-todo-edit-title-input" id="edit-title" class="edit-input" placeholder="Todo title"/>
        </div>

        <div class="edit-field">
          <label for="edit-description">Description</label>
          <textarea data-testid="test-todo-edit-description-input" id="edit-description" class="edit-textarea" placeholder="Add a description..."></textarea>
        </div>

        <div class="edit-row">
          <div class="edit-field">
            <label for="edit-priority">Priority</label>
            <select data-testid="test-todo-edit-priority-select" id="edit-priority">
              <option value="Low">Low</option>
              <option value="Medium">Medium</option>
              <option value="High">High</option>
            </select>
          </div>
          <div class="edit-field">
            <label for="edit-due-date">Due Date</label>
            <input type="date" data-testid="test-todo-edit-due-date-input" id="edit-due-date"/>
          </div>
        </div>

        <div class="edit-actions">
          <button data-testid="test-todo-save-button" id="save-btn" class="btn btn-save">Save changes</button>
          <button data-testid="test-todo-cancel-button" id="cancel-btn" class="btn btn-cancel">Cancel</button>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
